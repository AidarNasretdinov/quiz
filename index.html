<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body {
  font-family: Inter, Arial;
  background: #f3f4f8;
  padding: 20px;
}

.grid {
  display: grid;
  grid-template-columns: 1fr;
  gap: 16px;
}

.card {
  background: #f1f2f6;
  padding: 16px;
  border-radius: 16px;
}

.card h3 {
  margin-bottom: 10px;
}

.card ul {
  padding-left: 18px;
  font-size: 14px;
}

.btn {
  display: inline-block;
  margin: 5px;
  padding: 10px 14px;
  border-radius: 50%;
  cursor: pointer;
}

.btn-0 { background: #d9dde8; }
.btn-1 { background: #ffe58a; }
.btn-2 { background: #4c6fff; color: white; }

.btn.active {
  transform: scale(1.2);
}

</style>
</head>

<body>

<h2>Чек-лист: где ваш бизнес теряет время</h2>

<div class="grid" id="quiz"></div>

<script>

const data = [
{
title:"Ручные процессы",
items:[
"Ручные задачи каждый день",
"Копирование данных",
"Excel вместо систем",
"Зависимость от человека"
]
},
{
title:"Потери времени",
items:[
"Долгая обработка",
"Задержки этапов",
"Зависшие задачи",
"Поиск вручную"
]
},
{
title:"Ошибки",
items:[
"Ошибки ввода",
"Дубликаты",
"Потеря клиентов",
"Нет контроля"
]
},
{
title:"Коммуникации",
items:[
"Разные каналы",
"Нет истории клиента",
"Потери сообщений",
"Переспрашивание"
]
},
{
title:"Продажи",
items:[
"Заявки не фиксируются",
"Нет распределения",
"Нет напоминаний",
"Нет аналитики"
]
},
{
title:"Финансы",
items:[
"Excel учёт",
"Нет авто счетов",
"Ручные данные",
"Нет картины"
]
},
{
title:"Интеграции",
items:[
"Несвязанные сервисы",
"Ручной перенос",
"Нет API",
"Дублирование"
]
},
{
title:"Масштаб",
items:[
"Нельзя расти без найма",
"Процессы ломаются",
"Нет регламентов",
"Зависимость от людей"
]
}
];

const quiz = document.getElementById("quiz");

data.forEach((block,i)=>{

  let list = "<ul>";
  block.items.forEach(q=> list += `<li>${q}</li>`);
  list += "</ul>";

  const card = document.createElement("div");
  card.className = "card";

  card.innerHTML = `
    <h3>${i+1}. ${block.title}</h3>
    ${list}
    <div>
      <span class="btn btn-0">0</span>
      <span class="btn btn-1">1</span>
      <span class="btn btn-2">2</span>
    </div>
  `;

  quiz.appendChild(card);

});

</script>

</body>
</html>
