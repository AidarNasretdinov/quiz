<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body {
  font-family: Inter, Arial, sans-serif;
  background: #f5f7fc;
  margin: 0;
  padding: 16px;
}

.container {
  max-width: 900px;
  margin: auto;
}

/* HEADER */

.header-top {
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.logo img { height: 42px; }

.tagline {
  font-size: 12px;
  color: #6b7280;
}

/* HERO */

.hero h1 {
  font-size: 26px;
  line-height: 1.3;
  margin-top: 20px;
}
.hero span { color: #4c6fff; }

/* FORM */

.lead-form {
  background: white;
  padding: 24px;
  border-radius: 16px;
  margin-top: 20px;
  border: 1px solid #e5e7ef;
}

.lead-form h2 {
  margin-bottom: 10px;
}

.lead-form input {
  width: 100%;
  padding: 14px;
  margin-top: 12px;
  border-radius: 10px;
  border: 1px solid #ddd;
  font-size: 16px;
}

.lead-form button {
  margin-top: 18px;
  width: 100%;
  padding: 14px;
  background: linear-gradient(90deg, #4c6fff, #5a7cff);
  color: white;
  border: none;
  border-radius: 12px;
  cursor: pointer;
  font-size: 16px;
}

.error {
  color: red;
  font-size: 13px;
  margin-top: 6px;
}

/* GRID */

.grid {
  display: none;
  grid-template-columns: 1fr;
  gap: 16px;
  margin-top: 20px;
}

.card {
  background: white;
  border-radius: 16px;
  padding: 18px;
  border: 1px solid #e5e7ef;
}

.card h3 {
  margin-bottom: 10px;
}

.card ul {
  padding-left: 18px;
  font-size: 14px;
  color: #444;
}

/* BUTTONS */

.options {
  margin-top: 12px;
}

.btn {
  display: inline-block;
  padding: 10px 14px;
  margin-right: 8px;
  border-radius: 20px;
  cursor: pointer;
  border: 1px solid #ddd;
  font-weight: 500;
}

.btn.active {
  border: 2px solid #000;
}

.btn-0 { background: #e6ecff; }
.btn-1 { background: #ffe58a; }
.btn-2 { background: #4c6fff; color: white; }

/* RESULT */

.result {
  margin-top: 20px;
  background: white;
  padding: 18px;
  border-radius: 16px;
  text-align: center;
  border: 1px solid #e5e7ef;
  opacity: 0;
  transition: 0.3s;
}

.result.show { opacity: 1; }

.score {
  font-size: 30px;
  font-weight: bold;
}

/* CTA */

.cta {
  margin-top: 15px;
  display: none;
}

.cta button {
  background: #4c6fff;
  color: white;
  border: none;
  padding: 14px;
  border-radius: 12px;
  cursor: pointer;
  width: 100%;
}

/* DESKTOP */

@media(min-width: 768px){
  body { padding: 40px; }
  .grid { grid-template-columns: 1fr 1fr; }
  .hero h1 { font-size: 40px; }
}

</style>
</head>

<body>

<div class="container">

<div class="header-top">
  <div class="logo">
    <img src="5.png">
  </div>
  <div class="tagline">Автоматизация бизнес-процессов</div>
</div>

<div class="hero">
  <h1>
    Чек-лист: 
    <span>где ваш бизнес теряет время и деньги</span>
  </h1>
</div>

<!-- FORM -->

<div class="lead-form" id="leadForm">
  <h2>Получите диагностику бизнеса</h2>

  <input type="text" id="name" placeholder="Ваше имя">
  <input type="tel" id="phone" placeholder="+7 999 123 45 67">

  <div class="error" id="error"></div>

  <button onclick="startQuiz()">Начать</button>
</div>

<!-- QUIZ -->

<div class="grid" id="quiz"></div>

<!-- RESULT -->

<div class="result" id="result">
  <div>Сумма баллов</div>
  <div class="score" id="score">0</div>
  <div id="text"></div>

  <div class="cta" id="cta">
    <button onclick="contact()">Получить аудит</button>
  </div>
</div>

</div>

<script>

let leadData = {};
let answers = new Array(8).fill(null);

function startQuiz(){

  let name = document.getElementById("name").value.trim();
  let phone = document.getElementById("phone").value.replace(/\D/g, "");

  if(name.length < 2){
    document.getElementById("error").innerText = "Введите имя";
    return;
  }

  if(phone.length < 10){
    document.getElementById("error").innerText = "Введите корректный номер";
    return;
  }

  document.getElementById("error").innerText = "";

  leadData = { name, phone };

  document.getElementById("leadForm").style.display = "none";
  document.getElementById("quiz").style.display = "grid";
}

/* DATA */

const data = [
{title:"Ручные процессы",items:["Ручные задачи","Копирование данных","Excel вместо систем","Зависимость"]},
{title:"Потери времени",items:["Долгая обработка","Задержки","Зависшие задачи","Поиск"]},
{title:"Ошибки",items:["Ошибки ввода","Дубликаты","Потери клиентов","Нет контроля"]},
{title:"Коммуникации",items:["Разные каналы","Нет истории","Потери сообщений","Переспрашивание"]},
{title:"Продажи",items:["Заявки теряются","Нет распределения","Нет напоминаний","Нет аналитики"]},
{title:"Финансы",items:["Excel учёт","Нет автоматизации","Ручная сводка","Нет картины"]},
{title:"Интеграции",items:["Сервисы не связаны","Ручной перенос","Нет API","Дублирование"]},
{title:"Масштаб",items:["Нельзя расти","Процессы ломаются","Нет регламентов","Зависимость"]}
];

const quiz = document.getElementById("quiz");

data.forEach((block, i) => {

  let list = "<ul>";
  block.items.forEach(item => list += `<li>${item}</li>`);
  list += "</ul>";

  const card = document.createElement("div");
  card.className = "card";

  card.innerHTML = `
    <h3>${i+1}. ${block.title}</h3>
    ${list}
    <div class="options">
      <span class="btn btn-0" onclick="set(${i},0,this)">0</span>
      <span class="btn btn-1" onclick="set(${i},1,this)">1</span>
      <span class="btn btn-2" onclick="set(${i},2,this)">2</span>
    </div>
  `;

  quiz.appendChild(card);
});

function set(i,val,el){
  answers[i] = val;

  el.parentNode.querySelectorAll(".btn").forEach(b=>b.classList.remove("active"));
  el.classList.add("active");

  update();
}

function update(){

  if(answers.includes(null)) return;

  let sum = answers.reduce((a,b)=>a+b,0);

  document.getElementById("score").innerText = sum;

  let text = sum<=5 ? "Система работает хорошо"
            : sum<=12 ? "Есть потери времени"
            : "Критическая зона — бизнес теряет деньги";

  document.getElementById("text").innerText = text;

  document.getElementById("result").classList.add("show");
  document.getElementById("cta").style.display = "block";
}

function contact(){
  window.location.href = "https://t.me/yourusername";
}

</script>

</body>
</html>
