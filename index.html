<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
* { box-sizing: border-box; }

body {
  font-family: Inter, Arial;
  background: #f5f7fc;
  margin: 0;
  padding: 16px;
}

.container {
  max-width: 900px;
  margin: auto;
}

.lead-form {
  background: white;
  padding: 24px;
  border-radius: 20px;
}

.lead-form input {
  width: 100%;
  padding: 16px;
  margin-top: 12px;
  border-radius: 16px;
  border: 1px solid #ddd;
}

.lead-form button {
  margin-top: 20px;
  width: 100%;
  padding: 16px;
  background: #4c6fff;
  color: white;
  border: none;
  border-radius: 16px;
}

.grid {
  display: none;
  gap: 16px;
  margin-top: 20px;
}

.card {
  background: white;
  padding: 16px;
  border-radius: 16px;
}

.btn {
  padding: 10px;
  margin: 5px;
  border-radius: 20px;
  border: 1px solid #ddd;
  cursor: pointer;
}

.btn.active { border: 2px solid black; }

.btn-0 { background:#e6ecff; }
.btn-1 { background:#ffe58a; }
.btn-2 { background:#4c6fff; color:white; }

.result {
  display:none;
  margin-top:20px;
  background:white;
  padding:20px;
  border-radius:16px;
  text-align:center;
}

</style>
</head>

<body>

<div class="container">

<h1>Чек-лист бизнеса</h1>

<div class="lead-form" id="leadForm">
  <input id="name" placeholder="Ваше имя">
  <input id="phone" placeholder="+7 999 123 45 67">
  <div id="error" style="color:red"></div>
  <button onclick="startQuiz()">Начать</button>
</div>

<div id="quiz" class="grid"></div>

<div id="result" class="result">
  <h2 id="score"></h2>
</div>

</div>

<script>

const WEBHOOK = "https://hook.eu1.make.com/qt6ddmq795lcq2wcpvggji5740vvfcv5";

const data = [
"Ручные процессы","Потери времени","Ошибки","Коммуникации",
"Продажи","Финансы","Интеграции","Масштаб"
];

let answers = new Array(data.length).fill(null);
let lead = {};
let lead_id = null;
let resultSent = false;

/* генерация id лида */
function generateId(){
  return "lead_" + Date.now();
}

async function sendToMake(payload){
  try{
    await fetch(WEBHOOK,{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body: JSON.stringify(payload)
    });
  }catch(e){
    console.log("Ошибка webhook", e);
  }
}

/* форма */

function startQuiz(){

  let name = document.getElementById("name").value.trim();
  let phone = document.getElementById("phone").value.replace(/\D/g,'');

  if(name.length < 2){
    error.innerText="Введите имя"; return;
  }

  if(phone.length < 10){
    error.innerText="Введите номер"; return;
  }

  lead = { name, phone };
  lead_id = generateId();

  /* 🔥 отправка сразу */
  sendToMake({
    type: "lead_created",
    lead_id,
    name,
    phone,
    time: new Date().toISOString()
  });

  document.getElementById("leadForm").style.display="none";
  document.getElementById("quiz").style.display="grid";
}

/* генерация квиза */

const quiz = document.getElementById("quiz");

data.forEach((t,i)=>{
  let card=document.createElement("div");
  card.className="card";

  card.innerHTML=`
    <h3>${t}</h3>
    <span class="btn btn-0" onclick="set(${i},0,this)">0</span>
    <span class="btn btn-1" onclick="set(${i},1,this)">1</span>
    <span class="btn btn-2" onclick="set(${i},2,this)">2</span>
  `;

  quiz.appendChild(card);
});

/* ответы */

function set(i,val,el){
  answers[i]=val;

  el.parentNode.querySelectorAll(".btn").forEach(b=>b.classList.remove("active"));
  el.classList.add("active");

  update();
}

/* обновление */

function update(){

  if(answers.includes(null)) return;

  let sum = answers.reduce((a,b)=>a+b,0);

  document.getElementById("result").style.display="block";
  document.getElementById("score").innerText="Баллы: "+sum;

  /* 🔥 отправка результата */
  if(!resultSent){
    resultSent = true;

    sendToMake({
      type: "quiz_completed",
      lead_id,
      name: lead.name,
      phone: lead.phone,
      score: sum,
      answers: answers,
      time: new Date().toISOString()
    });
  }
}

</script>

</body>
</html>
