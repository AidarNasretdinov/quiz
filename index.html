<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Чек-лист бизнеса</title>

<style>
body {
  font-family: Inter, Arial, sans-serif;
  background: #f5f7fc;
  margin: 0;
  padding: 16px;
}

.container {
  max-width: 1000px;
  margin: auto;
}

/* HEADER */
.header-top {
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.logo img { height: 40px; }

.tagline {
  font-size: 12px;
  color: #6b7280;
}

/* HERO */
.hero h1 {
  font-size: 24px;
  line-height: 1.3;
}
.hero span { color: #4c6fff; }

/* FORM */
.lead-form {
  background: white;
  padding: 20px;
  border-radius: 12px;
  margin-top: 20px;
  border: 1px solid #e5e7ef;
}

.lead-form input {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  border-radius: 8px;
  border: 1px solid #ddd;
}

.lead-form button {
  margin-top: 15px;
  width: 100%;
  padding: 12px;
  background: #4c6fff;
  color: white;
  border: none;
  border-radius: 10px;
  cursor: pointer;
}

/* GRID */
.grid {
  display: none;
  grid-template-columns: 1fr;
  gap: 14px;
  margin-top: 20px;
}

.card {
  background: white;
  border-radius: 14px;
  padding: 16px;
  border: 1px solid #e5e7ef;
  transition: 0.25s;
}

.card h3 {
  margin-bottom: 10px;
}

.card ul {
  padding-left: 18px;
  font-size: 14px;
  color: #444;
}

/* BUTTONS */
.option {
  margin-top: 8px;
}

.btn {
  display: inline-block;
  padding: 6px 10px;
  margin-right: 6px;
  border-radius: 20px;
  cursor: pointer;
  border: 1px solid #ddd;
  font-size: 13px;
}

.btn.active {
  border: 2px solid #000;
}

.btn-0 { background: #e6ecff; }
.btn-1 { background: #ffe58a; }
.btn-2 { background: #4c6fff; color: white; }

/* RESULT */
.result {
  margin-top: 20px;
  background: white;
  padding: 16px;
  border-radius: 12px;
  text-align: center;
  border: 1px solid #e5e7ef;
  opacity: 0;
  transform: translateY(10px);
  transition: 0.4s;
}

.result.show {
  opacity: 1;
  transform: translateY(0);
}

.score {
  font-size: 28px;
  font-weight: bold;
}

/* CTA */
.cta {
  margin-top: 15px;
  display: none;
}

.cta button {
  background: #4c6fff;
  color: white;
  border: none;
  padding: 12px 18px;
  border-radius: 10px;
  cursor: pointer;
  margin: 5px;
}

/* DESKTOP */
@media(min-width: 768px){
  body { padding: 40px; }
  .grid { grid-template-columns: 1fr 1fr; }
  .hero h1 { font-size: 40px; }
  .logo img { height: 50px; }
}
</style>
</head>

<body>

<div class="container">

<div class="header-top">
  <div class="logo">
    <img src="5.png">
  </div>
  <div class="tagline">Автоматизация бизнес-процессов</div>
</div>

<div class="hero">
  <h1>Чек-лист: <span>где ваш бизнес теряет время и деньги</span></h1>
</div>

<!-- FORM -->
<div class="lead-form" id="leadForm">
  <h2>Получите диагностику бизнеса</h2>
  <input type="text" id="name" placeholder="Ваше имя">
  <input type="text" id="contact" placeholder="Telegram / Email / Телефон">
  <button onclick="startQuiz()">Начать</button>
</div>

<!-- QUIZ -->
<div class="grid" id="quiz"></div>

<!-- RESULT -->
<div class="result" id="result">
  <div>Сумма баллов</div>
  <div class="score" id="score">0</div>
  <div id="text"></div>

  <div class="cta" id="cta">
    <button onclick="contact()">Получить аудит</button>
    <button onclick="downloadPDF()">Скачать PDF</button>
  </div>
</div>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<script>

let leadData = {};

function startQuiz(){
  const name = document.getElementById("name").value;
  const contact = document.getElementById("contact").value;

  if(!name || !contact){
    alert("Заполните поля");
    return;
  }

  leadData = { name, contact };

  document.getElementById("leadForm").style.display = "none";
  document.getElementById("quiz").style.display = "grid";
}

/* DATA С ВОПРОСАМИ */

const data = [
{
title:"Ручные процессы",
items:[
"Задачи выполняются вручную?",
"Данные копируются между системами?",
"Используется Excel вместо CRM?",
"Зависимость от сотрудника?"
]
},
{
title:"Потери времени",
items:[
"Долгая обработка заявок?",
"Задержки между этапами?",
"Зависшие задачи?",
"Поиск информации вручную?"
]
},
{
title:"Ошибки",
items:[
"Ошибки из-за ручного ввода?",
"Дубликаты данных?",
"Потеря клиентов?",
"Нет контроля качества?"
]
},
{
title:"Коммуникации",
items:[
"Разные каналы общения?",
"Нет истории клиента?",
"Теряются сообщения?",
"Нужно переспрашивать?"
]
},
{
title:"Продажи",
items:[
"Заявки не фиксируются?",
"Нет распределения лидов?",
"Нет напоминаний?",
"Нет аналитики?"
]
},
{
title:"Финансы",
items:[
"Учёт в Excel?",
"Нет автоматических счетов?",
"Ручная сводка?",
"Нет актуальной картины?"
]
},
{
title:"Интеграции",
items:[
"Сервисы не связаны?",
"Ручной перенос данных?",
"Нет API?",
"Дублирование?"
]
},
{
title:"Масштаб",
items:[
"Нельзя расти без найма?",
"Процессы ломаются?",
"Нет регламентов?",
"Зависимость от людей?"
]
}
];

let answers = [];

const quiz = document.getElementById("quiz");

data.forEach((block, i) => {

  const card = document.createElement("div");
  card.className = "card";

  let html = `<h3>${i+1}. ${block.title}</h3><ul>`;

  block.items.forEach((q, j) => {
    const id = `${i}_${j}`;
    html += `
      <li>
        ${q}
        <div class="option" data-id="${id}">
          <span class="btn btn-0" onclick="set('${id}',0,this)">0</span>
          <span class="btn btn-1" onclick="set('${id}',1,this)">1</span>
          <span class="btn btn-2" onclick="set('${id}',2,this)">2</span>
        </div>
      </li>
    `;
  });

  html += "</ul>";
  card.innerHTML = html;

  quiz.appendChild(card);
});

function set(id,val,el){
  answers[id] = val;

  el.parentNode.querySelectorAll(".btn").forEach(b=>b.classList.remove("active"));
  el.classList.add("active");

  update();
}

function update(){

  const values = Object.values(answers);

  if(values.length < data.length * 4) return;

  let sum = values.reduce((a,b)=>a+b,0);

  document.getElementById("score").innerText = sum;

  let text = sum<=10 ? "Система работает хорошо"
            : sum<=25 ? "Есть потери времени"
            : "Критическая зона — бизнес теряет деньги";

  document.getElementById("text").innerText = text;

  document.getElementById("result").classList.add("show");
  document.getElementById("cta").style.display = "block";
}

function contact(){
  window.location.href = "https://t.me/yourusername";
}

function downloadPDF(){
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF();

  let y = 10;

  doc.text("Отчет", 10, y);
  y += 10;

  doc.text(`Имя: ${leadData.name}`, 10, y);
  y += 8;
  doc.text(`Контакт: ${leadData.contact}`, 10, y);
  y += 10;

  let sum = Object.values(answers).reduce((a,b)=>a+b,0);
  doc.text(`Баллы: ${sum}`, 10, y);

  doc.save("audit.pdf");
}

</script>

</body>
</html>
