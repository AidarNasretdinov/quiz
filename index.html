<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
* { box-sizing: border-box; }

body {
  font-family: Inter, Arial;
  background: #f5f7fc;
  margin: 0;
  padding: 16px;
}

.container {
  max-width: 900px;
  margin: auto;
}

h1 {
  font-size: 26px;
}
h1 span { color: #4c6fff; }

/* FORM */

.lead-form {
  background: white;
  padding: 24px;
  border-radius: 20px;
  margin-top: 20px;
}

.lead-form input {
  width: 100%;
  padding: 16px;
  margin-top: 12px;
  border-radius: 16px;
  border: 1px solid #ddd;
}

.lead-form button {
  margin-top: 20px;
  width: 100%;
  padding: 16px;
  background: #4c6fff;
  color: white;
  border: none;
  border-radius: 16px;
}

.error {
  color: red;
  font-size: 13px;
}

/* QUIZ */

.grid {
  display: none;
  gap: 16px;
  margin-top: 20px;
}

.card {
  background: white;
  padding: 18px;
  border-radius: 16px;
}

.card ul {
  padding-left: 18px;
  font-size: 14px;
  color: #444;
}

.btn {
  padding: 10px;
  margin: 5px;
  border-radius: 20px;
  border: 1px solid #ddd;
  cursor: pointer;
}

.btn.active { border: 2px solid black; }

.btn-0 { background:#e6ecff; }
.btn-1 { background:#ffe58a; }
.btn-2 { background:#4c6fff; color:white; }

/* RESULT */

.result {
  display:none;
  margin-top:20px;
  background:white;
  padding:20px;
  border-radius:16px;
  text-align:center;
}

.audit-btn {
  margin-top: 15px;
  padding: 14px;
  width: 100%;
  border-radius: 14px;
  background:#4c6fff;
  color:white;
  border:none;
  cursor:pointer;
}

</style>
</head>

<body>

<div class="container">

<h1>Чек-лист: <span>где бизнес теряет время и деньги</span></h1>

<!-- FORM -->
<div class="lead-form" id="leadForm">
  <input id="name" placeholder="Ваше имя">
  <input id="phone" placeholder="+7 999 123 45 67">
  <div id="error"></div>
  <button onclick="startQuiz()">Начать</button>
</div>

<!-- QUIZ -->
<div id="quiz" class="grid"></div>

<!-- RESULT -->
<div id="result" class="result">
  <h2 id="score"></h2>
  <div id="resultText"></div>

  <button class="audit-btn" onclick="contact()">
    Получить аудит
  </button>
</div>

</div>

<script>

const WEBHOOK = "https://hook.eu1.make.com/qt6ddmq795lcq2wcpvggji5740vvfcv5";

let lead = {};
let lead_id = null;
let answers = new Array(8).fill(null);
let resultSent = false;

/* DATA */

const data = [
{
title:"Ручные процессы",
items:[
"Ручные задачи каждый день",
"Копирование данных",
"Excel вместо систем",
"Зависимость от человека"
]
},
{
title:"Потери времени",
items:[
"Долгая обработка",
"Задержки",
"Зависшие задачи",
"Поиск вручную"
]
},
{
title:"Ошибки",
items:[
"Ошибки ввода",
"Дубликаты",
"Потери клиентов",
"Нет контроля"
]
},
{
title:"Коммуникации",
items:[
"Разные каналы",
"Нет истории",
"Потери сообщений",
"Переспрашивание"
]
},
{
title:"Продажи",
items:[
"Заявки теряются",
"Нет распределения",
"Нет напоминаний",
"Нет аналитики"
]
},
{
title:"Финансы",
items:[
"Excel учёт",
"Нет автоматизации",
"Ручная сводка",
"Нет картины"
]
},
{
title:"Интеграции",
items:[
"Сервисы не связаны",
"Ручной перенос",
"Нет API",
"Дублирование"
]
},
{
title:"Масштаб",
items:[
"Нельзя расти",
"Процессы ломаются",
"Нет регламентов",
"Зависимость"
]
}
];

/* INIT */

const quiz = document.getElementById("quiz");

data.forEach((block,i)=>{

  let list = "<ul>";
  block.items.forEach(item => list += `<li>${item}</li>`);
  list += "</ul>";

  let card = document.createElement("div");
  card.className = "card";

  card.innerHTML = `
    <h3>${i+1}. ${block.title}</h3>
    ${list}
    <div>
      <span class="btn btn-0" onclick="set(${i},0,this)">0</span>
      <span class="btn btn-1" onclick="set(${i},1,this)">1</span>
      <span class="btn btn-2" onclick="set(${i},2,this)">2</span>
    </div>
  `;

  quiz.appendChild(card);
});

/* HELPERS */

function generateId(){
  return "lead_" + Date.now();
}

function send(data){
  fetch(WEBHOOK,{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body: JSON.stringify(data)
  });
}

/* FORM */

function startQuiz(){

  let name = document.getElementById("name").value.trim();
  let phone = document.getElementById("phone").value.replace(/\D/g,'');

  if(name.length < 2){
    error.innerText="Введите имя"; return;
  }

  if(phone.length < 10){
    error.innerText="Введите номер"; return;
  }

  lead = { name, phone };
  lead_id = generateId();

  /* отправка лида сразу */
  send({
    type:"lead_created",
    lead_id,
    name,
    phone
  });

  document.getElementById("leadForm").style.display="none";
  document.getElementById("quiz").style.display="grid";
}

/* QUIZ */

function set(i,val,el){

  answers[i]=val;

  el.parentNode.querySelectorAll(".btn").forEach(b=>b.classList.remove("active"));
  el.classList.add("active");

  update();
}

function update(){

  if(answers.includes(null)) return;

  let sum = answers.reduce((a,b)=>a+b,0);

  document.getElementById("result").style.display="block";
  document.getElementById("score").innerText="Баллы: "+sum;

  let text = "";

  if(sum <= 5){
    text = "У вас всё хорошо, процессы уже настроены.";
  }
  else if(sum <= 12){
    text = "Есть потери времени — можно сильно улучшить.";
  }
  else{
    text = "Критическая зона — бизнес теряет деньги.";
  }

  document.getElementById("resultText").innerText = text;

  /* отправка результата */
  if(!resultSent){
    resultSent = true;

    send({
      type:"quiz_completed",
      lead_id,
      name: lead.name,
      phone: lead.phone,
      score: sum,
      answers: answers
    });
  }
}

/* CTA */

function contact(){
  window.location.href = "https://t.me/aidar_nasretdinov";
}

</script>

</body>
</html>
