<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
* { box-sizing: border-box; }

body {
  font-family: Inter, Arial;
  background: #f5f7fc;
  margin: 0;
  padding: 16px;
}

.container {
  max-width: 900px;
  margin: auto;
}

.hero h1 {
  font-size: 26px;
}
.hero span { color: #4c6fff; }

.lead-form {
  background: white;
  padding: 24px;
  border-radius: 20px;
  margin-top: 20px;
}

.lead-form input {
  width: 100%;
  padding: 16px;
  margin-top: 12px;
  border-radius: 16px;
  border: 1px solid #ddd;
}

.lead-form button {
  margin-top: 20px;
  width: 100%;
  padding: 16px;
  background: #4c6fff;
  color: white;
  border: none;
  border-radius: 16px;
}

.error { color:red; font-size:13px; }

.grid {
  display: none;
  gap: 16px;
  margin-top: 20px;
}

.card {
  background: white;
  padding: 18px;
  border-radius: 16px;
}

.card ul {
  padding-left: 18px;
  font-size: 14px;
  color: #444;
}

.btn {
  padding: 10px;
  margin: 5px;
  border-radius: 20px;
  border: 1px solid #ddd;
  cursor: pointer;
}

.btn.active { border: 2px solid black; }

.btn-0 { background:#e6ecff; }
.btn-1 { background:#ffe58a; }
.btn-2 { background:#4c6fff; color:white; }

.result {
  display:none;
  margin-top:20px;
  background:white;
  padding:20px;
  border-radius:16px;
  text-align:center;
}

</style>
</head>

<body>

<div class="container">

<h1>Чек-лист: <span>где бизнес теряет время и деньги</span></h1>

<!-- FORM -->
<div class="lead-form" id="leadForm">
  <input id="name" placeholder="Ваше имя">
  <input id="phone" placeholder="+7 999 123 45 67">
  <div id="error"></div>
  <button onclick="startQuiz()">Начать</button>
</div>

<!-- QUIZ -->
<div id="quiz" class="grid"></div>

<!-- RESULT -->
<div id="result" class="result">
  <h2 id="score"></h2>
</div>

</div>

<script>

const WEBHOOK = "https://hook.eu1.make.com/qt6ddmq795lcq2wcpvggji5740vvfcv5";

let lead = {};
let lead_id = null;
let answers = new Array(8).fill(null);
let resultSent = false;

/* DATA С ВОПРОСАМИ */

const data = [
{
title:"Ручные процессы",
items:[
"Есть ли задачи, которые выполняются вручную каждый день?",
"Копируются ли данные между системами?",
"Используется ли Excel вместо CRM?",
"Зависит ли процесс от конкретного человека?"
]
},
{
title:"Потери времени",
items:[
"Долго ли обрабатываются заявки?",
"Есть ли задержки между этапами?",
"Бывают ли зависшие задачи?",
"Ищут ли сотрудники информацию вручную?"
]
},
{
title:"Ошибки",
items:[
"Часто ли возникают ошибки?",
"Есть ли дубликаты данных?",
"Теряются ли клиенты?",
"Есть ли контроль качества?"
]
},
{
title:"Коммуникации",
items:[
"Общение в разных каналах?",
"Нет единой истории клиента?",
"Теряются сообщения?",
"Нужно переспрашивать?"
]
},
{
title:"Продажи",
items:[
"Все заявки фиксируются?",
"Есть распределение лидов?",
"Есть напоминания?",
"Анализируется ли воронка?"
]
},
{
title:"Финансы",
items:[
"Учёт в Excel?",
"Есть автоматизация счетов?",
"Данные сводятся вручную?",
"Есть актуальная картина?"
]
},
{
title:"Интеграции",
items:[
"Сервисы не связаны?",
"Нужно переносить данные вручную?",
"Нет API?",
"Дублируется информация?"
]
},
{
title:"Масштаб",
items:[
"Нельзя расти без найма?",
"Процессы ломаются при росте?",
"Нет регламентов?",
"Зависимость от сотрудников?"
]
}
];

/* INIT */

const quiz = document.getElementById("quiz");

data.forEach((block,i)=>{

  let list = "<ul>";
  block.items.forEach(item => list += `<li>${item}</li>`);
  list += "</ul>";

  let card = document.createElement("div");
  card.className = "card";

  card.innerHTML = `
    <h3>${i+1}. ${block.title}</h3>
    ${list}
    <div>
      <span class="btn btn-0" onclick="set(${i},0,this)">0</span>
      <span class="btn btn-1" onclick="set(${i},1,this)">1</span>
      <span class="btn btn-2" onclick="set(${i},2,this)">2</span>
    </div>
  `;

  quiz.appendChild(card);
});

/* FUNCTIONS */

function generateId(){
  return "lead_" + Date.now();
}

function send(data){
  fetch(WEBHOOK,{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body: JSON.stringify(data)
  });
}

function startQuiz(){

  let name = document.getElementById("name").value.trim();
  let phone = document.getElementById("phone").value.replace(/\D/g,'');

  if(name.length < 2){
    error.innerText="Введите имя"; return;
  }

  if(phone.length < 10){
    error.innerText="Введите номер"; return;
  }

  lead = { name, phone };
  lead_id = generateId();

  /* отправка сразу */
  send({
    type:"lead_created",
    lead_id,
    name,
    phone
  });

  document.getElementById("leadForm").style.display="none";
  document.getElementById("quiz").style.display="grid";
}

function set(i,val,el){

  answers[i]=val;

  el.parentNode.querySelectorAll(".btn").forEach(b=>b.classList.remove("active"));
  el.classList.add("active");

  update();
}

function update(){

  if(answers.includes(null)) return;

  let sum = answers.reduce((a,b)=>a+b,0);

  document.getElementById("result").style.display="block";
  document.getElementById("score").innerText="Баллы: "+sum;

  if(!resultSent){
    resultSent = true;

    send({
      type:"quiz_completed",
      lead_id,
      name: lead.name,
      phone: lead.phone,
      score: sum,
      answers: answers
    });
  }
}

</script>

</body>
</html>
